name: Setup DLT
description: Install system dependencies and build DLT daemon
inputs:
  dlt-repository:
    description: DLT daemon repository URL
    required: false
    default: https://github.com/COVESA/dlt-daemon.git
  dlt-ref:
    description: Git branch/tag/commit of DLT daemon to build
    required: false
    default: e858f33ff77941f07bd6613c6ff3afaf59a5a9a4
runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake \
          build-essential \
          ca-certificates \
          curl \
          zlib1g-dev \
          llvm-dev \
          libclang-dev \
          clang \
          coreutils
    - name: Build and install DLT
      shell: bash
      run: |
        git clone "${{ inputs.dlt-repository }}" dlt-daemon
        cd dlt-daemon
        git checkout "${{ inputs.dlt-ref }}"
        mkdir build && cd build
        cmake .. \
          -DDLT_IPC=UNIX_SOCKET \
          -DWITH_DLT_CONSOLE=ON \
          -DWITH_DLT_USE_IPv6=OFF \
          -DDLT_USER_IPC_PATH="/tmp" \
          -DDLT_USER=root \
          -DCMAKE_INSTALL_SYSCONFDIR=/etc
        make -j$(nproc)
        sudo make install
        echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/libdlt.conf
        sudo ldconfig
